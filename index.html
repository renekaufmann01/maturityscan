<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Capabilities Maturity Scan Report</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chart.js/3.7.1/chart.min.js"></script>
</head>
<body>
    <header>
        <h1>Data Capabilities Maturity Scan Report</h1>
        <p>Date: February 2, 2026</p>
    </header>
    <section id="report">
        <h2>Executive Summary</h2>
        <p>This is the complete report analyzing the maturity of data capabilities...</p>
        <canvas id="dataChart" width="400" height="200"></canvas>
    </section>
    <script>
        const ctx = document.getElementById('dataChart').getContext('2d');
        const dataChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Capability 1', 'Capability 2', 'Capability 3'],
                datasets: [{
                    label: 'Maturity Levels',
                    data: [12, 19, 3],
                    backgroundColor: ['rgba(75, 192, 192, 0.2)', 'rgba(255, 99, 132, 0.2)', 'rgba(255, 206, 86, 0.2)'],
                    borderColor: ['rgba(75, 192, 192, 1)', 'rgba(255, 99, 132, 1)', 'rgba(255, 206, 86, 1)'],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
