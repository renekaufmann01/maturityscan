<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zifo Digital Maturity Benchmark Report</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Zifo Digital Maturity Benchmark Report</h1>
    </header>
    <section id="report">
        <h2>Executive Summary</h2>
        <p>This report provides insights into the digital maturity of organizations across various sectors...</p>
        <canvas id="maturityChart"></canvas>
    </section>
    <footer>
        <p>&copy; 2026 Zifo Technologies.</p>
    </footer>
    <script>
        // Chart.js configuration
        var ctx = document.getElementById('maturityChart').getContext('2d');
        var maturityChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Development', 'Implementation', 'Optimization'],
                datasets: [{
                    label: 'Maturity Levels',
                    data: [12, 19, 3],
                    backgroundColor: 'rgba(75, 192, 192, 0.2)',
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
